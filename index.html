<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Avisene i Norge – interaktivt kart</title>

    <!-- Leaflet (open-source, no API key) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Avisene i Norge</h1>
      <p>Klikk på en by for å velge avis og se de tre mest leste sakene (siste 72 t).</p>
    </header>

    <div id="map"></div>

    <div class="legend">
      <span><i class="dot dot-local"></i> Lokalavis</span>
      <span><i class="dot dot-national"></i> Nasjonal avis</span>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
