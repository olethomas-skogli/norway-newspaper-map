<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Avisene i Norge – interaktivt kart</title>

    <!-- Leaflet (open-source, no API key) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Avisene i Norge</h1>
      <p>Klikk på en by for å velge avis og se de tre mest leste sakene.</p>

      <div class="controls">
        <input
          id="search"
          class="search"
          type="search"
          placeholder="Søk by eller avis…"
          list="search-list"
          autocomplete="off"
        />
        <datalist id="search-list"></datalist>

        <label class="field">
          Tidsrom:
          <select id="period">
            <option value="24">Siste døgn</option>
            <option value="48">Siste 2 døgn</option>
            <option value="72" selected>Siste 3 døgn</option>
          </select>
        </label>

        <label class="field">
          Fylke:
          <select id="county">
            <option value="all">Alle fylker</option>
          </select>
        </label>

        <label class="field">
          Mest lest:
          <select id="topreads">
            <option value="0" selected>Alle steder</option>
            <option value="10">Topp 10 steder</option>
            <option value="25">Topp 25 steder</option>
            <option value="50">Topp 50 steder</option>
          </select>
        </label>

        <label class="checkbox-field">
          <input id="free-only" type="checkbox" />
          Vis kun gratis saker
        </label>

        <span id="filter-status" class="filter-status" hidden></span>
      </div>
    </header>

    <div id="map"></div>

    <div class="legend">
      <span><i class="dot dot-local"></i> Lokalavis</span>
      <span><i class="dot dot-national"></i> Nasjonal avis</span>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
