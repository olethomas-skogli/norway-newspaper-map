<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Avisene i Norge – interaktivt kart</title>

    <!-- Leaflet (open-source, no API key) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Skjer i Norge om dagen a?</h1>
      <p>Klikk på en by for å velge avis og se de tre mest leste sakene.</p>

      <div class="mode-buttons">
        <button id="sport-toggle" class="sport-toggle" type="button">
          ⚽ Sport mode
        </button>
        <button id="genz-toggle" class="genz-toggle" type="button">
          ✨ Gen Z mode
        </button>
      </div>

      <!-- Sport-mode controls (shown only when body.sport-mode) -->
      <div class="sport-controls">
        <label class="field">
          Idrett:
          <select id="sport-type">
            <option value="all" selected>Alle idretter</option>
          </select>
        </label>
        <label class="field">
          Når:
          <select id="sport-week">
            <option value="all" selected>Alle</option>
            <option value="this">Denne uka</option>
            <option value="next">Neste uke</option>
          </select>
        </label>
        <span id="sport-note" class="sport-note"></span>
      </div>

      <!-- genZ-mode controls (shown only when body.genz-mode) -->
      <div class="genz-controls">
        <span id="genz-note" class="genz-note">Klikk en by for å se reels</span>
      </div>

      <div class="controls">
        <input
          id="search"
          class="search"
          type="search"
          placeholder="Søk by eller avis…"
          list="search-list"
          autocomplete="off"
        />
        <datalist id="search-list"></datalist>

        <label class="field">
          Tidsrom:
          <select id="period">
            <option value="24">Siste døgn</option>
            <option value="48">Siste 2 døgn</option>
            <option value="72" selected>Siste 3 døgn</option>
          </select>
        </label>

        <label class="field">
          Fylke:
          <select id="county">
            <option value="all">Alle fylker</option>
          </select>
        </label>

        <label class="field">
          Mest lest:
          <select id="topreads">
            <option value="0" selected>Alle steder</option>
            <option value="10">Topp 10 steder</option>
            <option value="25">Topp 25 steder</option>
            <option value="50">Topp 50 steder</option>
          </select>
        </label>

        <label class="checkbox-field">
          <input id="free-only" type="checkbox" />
          Vis kun gratis saker
        </label>

        <span id="filter-status" class="filter-status" hidden></span>
      </div>
    </header>

    <div id="map"></div>

    <div class="legend">
      <span><i class="dot dot-local"></i> Lokalavis</span>
      <span><i class="dot dot-national"></i> Nasjonal avis</span>
      <span class="legend-sport"><i class="dot dot-sport"></i> Sport (direktesport.no)</span>
      <span class="legend-genz"><i class="dot dot-genz"></i> Video (Gen Z)</span>
    </div>

    <!-- Fullscreen TikTok/Reels-style viewer (genZ mode) -->
    <div id="reels-viewer" class="reels-viewer" hidden aria-hidden="true">
      <div class="reels-frame">
        <button class="reels-close" type="button" aria-label="Lukk">✕</button>
        <button id="reels-mute" class="reels-mute" type="button" aria-label="Slå lyd av/på">🔇</button>
        <div id="reels-track" class="reels-track"></div>
      </div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
