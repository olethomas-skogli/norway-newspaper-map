# Netlify config for the newspaper map.
#
# The site is static, but the upstream APIs send no CORS headers, so direct
# browser calls are blocked. These status=200 redirects proxy our own /api/*
# paths to the real endpoints server-side, so the browser sees a same-origin
# response and CORS never applies. Incoming query parameters are forwarded.
# (Data proxies live under /api/ so top-level paths — /sport, /gen-z, /aviser —
# are free for client-side routing.)
#
# This mirrors what serve.mjs does for local dev.

[[redirects]]
  from = "/api/articles"
  to = "https://services.api.no/api/stagehand/insights/articles/bestread"
  status = 200
  force = true

[[redirects]]
  from = "/api/sport"
  to = "https://services.api.no/api/content/search/sport/v2"
  status = 200
  force = true

[[redirects]]
  from = "/api/video"
  to = "https://services.api.no/api/content/search/video"
  status = 200
  force = true

# Reels: the app sends content/tail/publication as query params (the `to` has
# none) so Netlify forwards them all.
[[redirects]]
  from = "/api/reels"
  to = "https://services.api.no/api/video-yoshi/v1/reels"
  status = 200
  force = true

# SPA fallback: serve index.html for client-side routes (/sport, /gen-z, /aviser).
# Non-force, so real static files (style.css, app.js, *.geojson) are served first.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
